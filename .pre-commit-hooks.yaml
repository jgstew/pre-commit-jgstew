---
- id: minimum-changes
  name: Minimum Changes
  description: This hook checks for a minimum number of line changes against git diff
  entry: minimum-changes
  language: python
  pass_filenames: True
  require_serial: True
  types: [text]
- id: validate-bes
  name: Validate BigFix BES Files
  description: This hook validates BigFix BES XML Files
  entry: validate-bes
  language: python
  pass_filenames: True
  types: [text]
  files: \.(bes|ojo)$
- id: validate-plist
  name: Validate Apple plist Files
  description: This hook validates Apple plist Files
  entry: validate-plist
  language: python
  pass_filenames: True
  types: [text]
  files: \.(recipe|plist)$
- id: verify-files-contain-entry
  name: Verify Files Contain Entry
  description: This hook validates that a file has a regex match or group within a reference file
  entry: verify-files-contain-entry
  language: python
  pass_filenames: True
  types: [text]
- id: verify-files-contain-pattern
  name: Verify Files Contain Pattern
  description: This hook validates that a file has a regex match or group within a reference file
  entry: verify-files-contain-pattern
  language: python
  pass_filenames: True
  types: [text]
- id: verify-files-are-ascii
  name: Verify Files Are ASCII
  description: This hook validates that a file has only ASCII contents
  entry: verify-files-are-ascii
  language: python
  pass_filenames: True
  types: [text]
- id: git-clean
  name: Run Git Clean
  description: This will delete untracked files by running `git clean -f`
  entry: git-clean
  language: python
  pass_filenames: False
- id: regex-search-filter-replace
  name: RegEx Search Filter Replace
  description: This hook replaces file contents based upon RegEx and RegEx filter
  entry: regex-search-filter-replace
  language: python
  pass_filenames: True
  types: [text]
  files: \.(xml|html|htm|bes|ojo)$
- id: revert-missing-change
  name: Revert Missing Change
  description: This hook requires a regex match in the git history of a file.
  entry: revert-missing-change
  language: python
  pass_filenames: True
  require_serial: True
  types: [text]
  stages: [manual]
- id: github-action-set-output-fix
  name: Github Action Set Output Fix
  description: This hook replaces github action lines using deprecated set-output or save-state
  entry: github-action-set-output-fix
  language: python
  pass_filenames: True
  types: [text]
  files: \.(yml|yaml)$
- id: add-missing-docstrings
  name: Add missing function docstrings
  description: >
    Inserts a boilerplate docstring into named functions (default: main) when
    the docstring is absent or empty. Exits 1 and modifies the files so the
    author can review, re-stage, and commit again.
  language: python
  pass_filenames: True
  entry: add-missing-docstrings
  types: [python]
  args:
    - "--functions=main"
    - "--docstring=Execution starts here."
- id: check-processor-conventions
  name: Check AutoPkg processor conventions
  description: >
    Picky, opinionated checks for AutoPkg processor .py files (boilerplate,
    docstrings, input/output_variables, __main__ guard, etc.). Auto-fixes the
    fixable issues in place and can build out a new-processor stub; exits 1 when
    anything was fixed or any issue remains so the author re-stages and commits
    again. Non-processor files are skipped with a non-failing warning.
  language: python
  pass_filenames: True
  entry: check-processor-conventions
  types: [python]
- id: check-recipe-conventions
  name: Check AutoPkg recipe conventions
  description: >
    Picky, opinionated cross-field checks for AutoPkg recipe files (YAML or
    plist) that a JSON schema cannot express: Identifier<->Input NAME,
    ParentRecipe resolvability and cycles, duplicate Identifiers/Descriptions,
    filename<->identifier type, MinimumVersion floor, Process-step blank-line
    spacing, http/https, regex validity, and shared-processor references.
    Auto-fixes the fixable ones in place and exits 1 when anything was fixed;
    pass --strict to also fail on remaining warnings.
  language: python
  pass_filenames: True
  entry: check-recipe-conventions
  types: [text]
  files: \.recipe(\.ya?ml)?$
