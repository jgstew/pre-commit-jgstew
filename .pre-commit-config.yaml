---
# run on only items staged in git:  pre-commit
# automatically run on commit:      pre-commit install
# check all files in repo:          pre-commit run --all-files
# check all files in repo:          pre-commit run --all-files --hook-stage manual
# update all pre-commit hooks:      pre-commit autoupdate
# https://github.com/pre-commit/pre-commit-hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      # - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-ast
      - id: check-case-conflict
      - id: check-merge-conflict
      # - id: check-xml
      - id: end-of-file-fixer
      # https://www.aleksandrhovhannisyan.com/blog/crlf-vs-lf-normalizing-line-endings-in-git/
      # - id: mixed-line-ending
      #   args: ['--fix=no']
      - id: requirements-txt-fixer
      - id: trailing-whitespace
      #  args: [--markdown-linebreak-ext=md]
      - id: detect-private-key

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yaml]

  - repo: https://github.com/pre-commit/mirrors-isort
    rev: v5.10.1
    hooks:
      - id: isort

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/jgstew/pre-commit-jgstew
    rev: v1.6.2
    hooks:
      - id: minimum-changes
        args: [--min-changes=0]
        stages: [manual]
      - id: verify-files-are-ascii

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-github-workflows
        args: ["--verbose"]
        stages: [manual]
      - id: check-dependabot
        stages: [manual]

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        name: Upgrade Python syntax
        args: [--py38-plus]
        stages: [manual]

  - repo: https://github.com/DanielNoord/pydocstringformatter
    rev: v1.0.0
    hooks:
      - id: pydocstringformatter
        args: ["--max-summary-lines=2", "--linewrap-full-docstring"]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      # see config in pyproject.toml
      - id: codespell

  # - repo: https://github.com/crate-ci/typos
  #   # v1.48.0
  #   rev: v1.48.0
  #   hooks:
  #     - id: typos

  - repo: https://github.com/adamchainz/blacken-docs
    rev: "1.20.0"
    hooks:
      - id: blacken-docs
        additional_dependencies:
          - black>=22.12.0

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
        stages: [manual]
      - id: python-no-log-warn
        stages: [manual]
      - id: python-use-type-annotations
        stages: [manual]
        exclude: ^pre_commit_jgstew/autopkg_recipe_check_conventions.py$
      - id: python-no-eval
        stages: [manual]
      - id: python-check-blanket-type-ignore
        stages: [manual]

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
        stages: [manual]

  - repo: https://github.com/regebro/pyroma
    rev: "5.1b1"
    hooks:
      - id: pyroma
        # Must be specified because of the default value in pyroma
        always_run: false
        files: |
          (?x)^(
              README.md|
              pyproject.toml|
              pre_commit_jgstew/__init__.py|
              setup.cfg|
              setup.py
          )$
        stages: [manual]

  - repo: https://github.com/Pierre-Sassoulas/black-disable-checker
    rev: v1.1.3
    hooks:
      - id: black-disable-checker
        stages: [manual]

  - repo: meta
    hooks:
      - id: check-useless-excludes
        stages: [manual]
      - id: check-hooks-apply
        stages: [manual]

  # - repo: https://github.com/hhatto/autopep8
  #   rev: v2.3.2
  #   hooks:
  #     - id: autopep8
  #       stages: [manual]

  # - repo: https://github.com/pycqa/pylint
  #   rev: v4.0.6
  #   hooks:
  #     - id: pylint
  #       args: [--rcfile=.pylintrc]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-r", "-lll"]
        stages: [manual]

  - repo: https://github.com/sirosen/slyp
    rev: 0.9.0
    hooks:
      - id: slyp
        exclude: ^tests/test_autopkg_processor_check_conventions.py$
        stages: [manual]

  - repo: https://github.com/woodruffw/zizmor-pre-commit
    # Find security issues in GitHub Actions CI/CD setups.
    rev: v1.27.0
    hooks:
      # Run the linter.
      - id: zizmor
        # args: ["--fix=all"]
        stages: [manual]

  # - repo: https://github.com/RobertCraigie/pyright-python
  #   rev: v1.1.411
  #   hooks:
  #     - id: pyright  # pylance
  #       exclude: ^examples/.*$|^tests/.*$
  #       additional_dependencies:
  #         - validate_bes_xml
  #         - importlib-metadata
  #         - setuptools
  #         - validate-plist-xml
  #         - PyYAML
  #         - anyascii

  # Local Hooks:
  # https://towardsdatascience.com/getting-started-with-python-pre-commit-jgstew-28be2b2d09d5
  # language: python -> pre-commit provisions an isolated venv, so bare `python`
  # always resolves (no dependence on a system `python` shim). Third-party
  # imports must be declared via additional_dependencies.
  - repo: local
    hooks:
      - id: validate-bes-local
        name: validate-bes-local
        entry: python pre_commit_jgstew/validate_bes.py
        language: python
        # isolated venv: declare the third-party import used by validate_bes.py
        additional_dependencies: [validate_bes_xml]
        pass_filenames: True
        files: \.(bes|ojo)$
  - repo: local
    hooks:
      - id: verify-files-contain-entry-local
        name: verify-files-contain-entry-local
        entry: python pre_commit_jgstew/verify_files_contain_entry.py
        language: python
        pass_filenames: True
        files: \.bes$
        args:
          [
            "--ref-file=tests/examples/example.test_file",
            "--re-pattern=(?i)<Title>(.+)</Title>",
          ]
  - repo: local
    hooks:
      - id: verify-files-contain-pattern-local
        name: verify-files-contain-pattern-local
        entry: python pre_commit_jgstew/verify_files_contain_pattern.py
        language: python
        pass_filenames: True
        files: \.test_file$
        args: ["--re-pattern=(?i)Example"]
  - repo: local
    hooks:
      - id: minimum-changes-local
        name: minimum-changes-local
        entry: python pre_commit_jgstew/minimum_changes.py
        language: python
        pass_filenames: True
        args: [--min-changes=2]
        files: .test_file
  - repo: local
    hooks:
      - id: git-clean
        name: git-clean-local
        entry: python pre_commit_jgstew/git_clean.py
        language: python
        files: .test_file
  # - repo: local
  #   hooks:
  #     - id: revert-missing-change
  #       name: revert-missing-change-local
  #       entry: python pre_commit_jgstew/revert_missing_change.py
  #       language: python
  #       pass_filenames: True
  #       args: ['--change_regex=v[0-9]+(\.[0-9]+)*\s*</Title>']
  #       files: .test_file
  - repo: local
    hooks:
      - id: github-action-set-output-fix
        name: github-action-set-output-fix-local
        entry: python pre_commit_jgstew/github_action_set_output_fix.py
        language: python
        pass_filenames: True
        args: ['--overwrite']
        files: \.(yaml|yml)$
  - repo: local
    hooks:
      - id: try-repo
        name: try-repo
        entry: pre-commit try-repo . --files tests/examples/example.test_file tests/examples/example-test.bes
        language: system
        pass_filenames: False
        require_serial: True
        stages: [manual]
  - repo: local
    hooks:
      - id: add-missing-docstrings
        name: add-missing-docstrings
        entry: python pre_commit_jgstew/add_main_docstring.py
        language: python
        pass_filenames: True
  - repo: local
    hooks:
      # This repo has no AutoPkg processors of its own, so this is a manual-stage
      # smoke test (report-only). Downstream AutoPkg repos use the published
      # `check-processor-conventions` hook; see README / jgstew-recipes.
      - id: check-processor-conventions
        name: check-processor-conventions-local
        entry: python pre_commit_jgstew/autopkg_processor_check_conventions.py
        language: python
        pass_filenames: True
        args: ["--auto-fix=no"]
        types: [python]
        stages: [manual]

  - repo: https://github.com/christophmeissner/pytest-pre-commit
    rev: 1.0.0
    hooks:
      # see config in pyproject.toml
      - id: pytest
        pass_filenames: false
        always_run: true
        stages: [manual]
        additional_dependencies:
          - validate_bes_xml
          - importlib-metadata
          - setuptools
          - validate-plist-xml
          - PyYAML
          - anyascii
